<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOM Events Assignment</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="style.css" />

    <script async src="script.js"></script>
  </head>
  <body>
    <!-- ===== Page Heading ===== -->
    <h1>DOM Event Listeners Assignment</h1>

    <!-- ===== Task 1 Card ===== -->
    <div class="card">
      <!-- Button click event -->
      <h2>Task 1: Button Click Event</h2>
      <button id="clickBtn">Click Me</button>
    </div>

    <!-- ===== Task 2 Card ===== -->
    <div class="card">
      <!-- Change text on button click -->
      <h2>Task 2: Change Text</h2>
      <p id="textPara">This is original text.</p>
      <button id="changeTextBtn">Change Text</button>
    </div>

    <!-- ===== Task 3 Card ===== -->
    <div class="card">
      <!-- Background color change -->
      <h2>Task 3: Background Color</h2>
      <button id="bgBtn">Change Background</button>
    </div>

    <!-- ===== Task 4 Card ===== -->
    <div class="card">
      <!-- Live input event -->
      <h2>Task 4: Live Typing</h2>
      <input type="text" id="liveInput" placeholder="Type something..." />
      <p id="liveText"></p>
    </div>

    <!-- ===== Task 5 Card ===== -->
    <div class="card">
      <!-- Mouse enter and leave events -->
      <h2>Task 5: Mouse Events</h2>
      <div id="hoverBox">Hover Over Me</div>
    </div>

    <!-- ===== Task 6 Card ===== -->
    <div class="card">
      <!-- Double click event -->
      <h2>Task 6: Double Click</h2>
      <button id="dblClickBtn">Double Click Me</button>
    </div>

    <!-- External JavaScript file -->
    <script src="script.js"></script>
  </body>
</html>
